name: deploy-battleship-demo

on:
  pull_request:
    paths:
      - "demos/battleship-with-web-skill/**"
      - ".github/workflows/deploy-battleship-demo.yml"
  push:
    branches:
      - main
    paths:
      - "demos/battleship-with-web-skill/**"
      - ".github/workflows/deploy-battleship-demo.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: battleship-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demos/battleship-with-web-skill
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_BATTLESHIP }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: demos/battleship-with-web-skill/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        run: |
          pnpm dlx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel build --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pnpm dlx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          pnpm dlx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
