name: Bug report
description: Report a reproducible problem in web-skill
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug. Please include enough detail for us to reproduce it.
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 0.1.1
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version, package manager, framework, browser, or other relevant setup
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Tell us how to reproduce the problem
      placeholder: |
        1. Install ...
        2. Configure ...
        3. Run ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Logs, screenshots, minimal code sample, or workaround
