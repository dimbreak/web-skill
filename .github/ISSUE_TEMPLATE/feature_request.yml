name: Feature request
description: Suggest an improvement for web-skill
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow gap
      description: What real workflow problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation improvement you want
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Example usage, constraints, related tools, or implementation notes
